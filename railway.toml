[build]
builder = "DOCKERFILE"

[[services]]
name = "crm-backend"
source = "backend"

[services.build]
dockerfilePath = "Dockerfile"
buildTarget = "runner"

[services.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "crm-frontend"
source = "frontend"

[services.build]
dockerfilePath = "Dockerfile"
buildTarget = "runner"

[services.deploy]
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
